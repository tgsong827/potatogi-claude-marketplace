[cli.gh]
name = "GitHub CLI"
check = "gh --version"
install = "brew install gh"

[cli.gh.setup]
commands = [
  'gh auth login',
]
description = "GitHub 인증 설정"

[runtime.node]
name = "Node.js"
check = "node --version"
install = "brew install node"

[runtime.bun]
name = "Bun"
check = "bun --version"
install = "brew install oven-sh/bun/bun"

[runtime.bun.setup]
commands = [
  'echo ''export BUN_INSTALL="$HOME/.bun"'' >> ~/.zshrc',
  'echo ''export PATH="$BUN_INSTALL/bin:$PATH"'' >> ~/.zshrc',
]
description = "BUN_INSTALL 환경변수 및 PATH 설정"

[devtool.docker]
name = "Docker"
check = "docker --version"
install = "brew install --cask docker"
