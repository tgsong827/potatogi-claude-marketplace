# 7. App
# =============================================================================

# -- ide --

[app.zed]
name = "Zed"
check = "[ -d \"/Applications/Zed.app\" ] && echo \"Zed installed\""
install = "brew install --cask zed"
latest = "brew info --cask zed --json=v2 | jq -r '.casks[0].version'"
update = "brew upgrade --cask zed"

# -- terminal --

[app.cmux]
name = "cmux"
check = "[ -d \"/Applications/cmux.app\" ] && echo \"cmux installed\""
install = "brew install --cask cmux"
latest = "brew info --cask cmux --json=v2 | jq -r '.casks[0].version'"
update = "brew upgrade --cask cmux"

[app.cmux.setup]
commands = [
  "mkdir -p \"$HOME/Library/Application Support/com.cmuxterm.app\"",
  "touch \"$HOME/Library/Application Support/com.cmuxterm.app/config.ghostty\"",
  "grep -q \"^font-family = MesloLGLDZ\" \"$HOME/Library/Application Support/com.cmuxterm.app/config.ghostty\" || echo 'font-family = MesloLGLDZ Nerd Font Mono + D2CodingLigature Nerd Font Mono' >> \"$HOME/Library/Application Support/com.cmuxterm.app/config.ghostty\"",
  "grep -q \"^font-size = \" \"$HOME/Library/Application Support/com.cmuxterm.app/config.ghostty\" || echo 'font-size = 14' >> \"$HOME/Library/Application Support/com.cmuxterm.app/config.ghostty\"",
]
description = "cmux는 Ghostty 기반이며 ~/Library/Application Support/com.cmuxterm.app/config.ghostty를 읽음. 폰트 설정 추가 (MesloLGLDZ + D2CodingLigature Nerd Font, size 14)"

